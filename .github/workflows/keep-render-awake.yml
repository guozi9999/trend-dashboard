name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 20 "$RENDER_HEALTH_URL"
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
